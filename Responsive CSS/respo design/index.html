<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day 8 - Responsive Design</title>

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      font-size: clamp(0.875rem, 1.5vw, 1.125rem);
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-style: italic;
      font-weight: bold;
      font-family: 'Times New Roman', Times, serif;
      text-decoration:underline
      ;
    }

    .container {
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .image-wrapper {
      width: 100%;
      height: 200px;
      overflow: hidden;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero {
      min-height: 100vh;
      padding: 10vh 5vw;
      display: flex;
      align-items: center;
      justify-content: center;
    
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #333;
      color: #fff;
    }

    .nav-links {
      display: none;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      color: white;
      text-decoration: none;
    }

    .hamburger {
      font-size: 24px;
      cursor: pointer;
    }

    @media (min-width: 768px) {
      body {
        font-size: 1.125rem;
      }

      .container {
        grid-template-columns: repeat(2, 1fr);
        padding: 30px;
      }

      .nav-links {
        display: flex;
        gap: 20px;
      }

      .hamburger {
        display: none;
      }
    }

    @media (min-width: 1024px) {
      .container {
        grid-template-columns: repeat(3, 1fr);
    
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        font-size: 2.5rem;
      }

      h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="logo" style="font-family: Georgia, 'Times New Roman', Times, serif;font-weight: bold;font-style: italic;">MY PAGE</div>
    <div class="hamburger">&#9776;</div>
    <ul class="nav-links">
      <li><a href="#" style="text-decoration: underline;">Home</a></li>
      <li><a href="#" style="text-decoration: underline;">About</a></li>
      <li><a href="#" style="text-decoration: underline;">Services</a></li>
      <li><a href="#" style="text-decoration: underline;">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <h1>BIKERS GALLERY</h1>
  </section>

  <div class="container">
    <div class="image-wrapper">
      <img src="img/apr.jpg" alt="Sample Image">
    </div>
    <div class="image-wrapper">
      <img src="img/r15.jpg" alt="Sample Image">
    </div>
    <div class="image-wrapper">
      <img src="img/RE.jpg" alt="Sample Image">
    </div>
  </div>

</body>
</html>
